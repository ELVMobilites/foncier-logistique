<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELV Mobilités — Recensement des Espaces Logistiques</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script>
<style>
:root{--navy:#1B3A5C;--blue:#2E86C1;--orange:#E67E22;--green:#27AE60;--red:#E74C3C;--dark:#2C3E50;--grey:#7F8C8D;--glt:#BDC3C7;--bg:#F4F6F8;--bdr:#DEE2E6;--r:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--dark);line-height:1.5}
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),#234E7A,var(--blue));z-index:9999;display:flex;align-items:center;justify-content:center}
.login-overlay.hide{display:none}
.lbox{background:#fff;border-radius:16px;padding:40px;width:440px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.lbox img{height:60px;margin-bottom:16px}
.lbox h2{color:var(--navy);font-size:20px;margin-bottom:4px}
.lbox .sub{color:var(--grey);font-size:13px;margin-bottom:24px}
.ltabs{display:flex;margin-bottom:20px;border-radius:var(--r);overflow:hidden;border:2px solid var(--navy)}
.ltab{flex:1;padding:10px;cursor:pointer;font-weight:600;font-size:13px;border:none;background:#fff;color:var(--navy);transition:.2s}
.ltab.on{background:var(--navy);color:#fff}
.lbox input,.lbox select{width:100%;padding:11px 14px;border:2px solid var(--bdr);border-radius:var(--r);font-size:14px;margin-bottom:10px;outline:none}
.lbox input:focus,.lbox select:focus{border-color:var(--blue)}
.btnL{width:100%;padding:12px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;color:#fff;margin-top:4px}
.btnL.adm{background:var(--navy)}.btnL.agt{background:var(--green)}
.lerr{color:var(--red);font-size:12px;margin-bottom:6px;min-height:16px}
.pnl{display:none}.pnl.on{display:block}
.abar{background:#1a1a2e;color:#fff;padding:6px 32px;font-size:12px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
.abar.on{display:flex}
.abar .au{font-weight:600;color:var(--orange)}
.abar button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap}
.abar button:hover{background:rgba(255,255,255,.25)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:none;align-items:center;justify-content:center}
.mbg.on{display:flex}
.mdl{background:#fff;border-radius:12px;padding:28px;width:560px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.mdl h3{color:var(--navy);margin-bottom:16px;font-size:18px}
.mdl label{display:block;font-size:12px;font-weight:600;color:var(--grey);text-transform:uppercase;margin-bottom:4px;margin-top:14px}
.mdl input,.mdl select{width:100%;padding:10px;border:2px solid var(--bdr);border-radius:var(--r);font-size:14px;outline:none;margin-bottom:2px}
.mdl input:focus{border-color:var(--blue)}
.mbtns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.mb{padding:8px 20px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer}
.mb-ok{background:var(--green);color:#fff}.mb-no{background:var(--glt);color:var(--dark)}.mb-del{background:var(--red);color:#fff}
.pc{background:#F8F9FA;border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px}
.pc h4{color:var(--navy);font-size:14px;margin-bottom:6px}
.pc .pci{font-size:12px;color:var(--grey);margin-bottom:8px;line-height:1.6}
.pc .pci strong{color:var(--dark)}
.pc .pca{display:flex;gap:6px;flex-wrap:wrap}
.pcb{padding:4px 10px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:#fff}
.hdr{background:linear-gradient(135deg,var(--navy) 0%,#234E7A 60%,var(--blue) 100%);color:#fff}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;flex-wrap:wrap;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:16px}
.hdr-logo img{height:52px}
.hdr-lt{border-left:2px solid rgba(255,255,255,.3);padding-left:16px}
.hdr-lt h1{font-size:20px;font-weight:700}
.hdr-lt .tg{font-size:11px;opacity:.85;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hdr-ct{text-align:right;font-size:12px;opacity:.85}
.hdr-ct a{color:#fff;text-decoration:none}
.hdr-b{background:rgba(0,0,0,.18);padding:10px 32px;font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-b .mt{margin-left:auto;font-size:11px;opacity:.7;letter-spacing:2px;text-transform:uppercase}
.srch{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:20px 32px}
.sr{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.sf{flex:1;min-width:280px;position:relative}
.sf label{display:block;font-size:11px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sf input{width:100%;padding:10px 14px;border:2px solid var(--bdr);border-radius:var(--r);font-size:15px;outline:none}
.sf input:focus{border-color:var(--blue)}
.hint{font-size:11px;color:var(--orange);margin-top:4px;display:none}.hint.on{display:block}
.sug{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:300px;overflow:auto;display:none}
.sug.open{display:block}
.si{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0}.si:hover{background:#EBF5FB}
.si strong{color:var(--navy)}.si .meta{color:var(--grey);margin-left:8px;font-size:13px}
.slo{padding:12px 14px;color:var(--grey);font-size:13px;font-style:italic}
.btn{padding:10px 24px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-go{background:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(230,126,34,.3)}.btn-go:hover{background:#D35400}
.btn-go:disabled{background:var(--glt);box-shadow:none;cursor:not-allowed;color:#fff}
.btn-csv{background:var(--green);color:#fff;display:none}
.btn-o{background:transparent;color:var(--navy);border:2px solid var(--bdr)}.btn-o.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.prog{margin-top:16px;display:none}.prog.on{display:block}
.prog-i{display:flex;justify-content:space-between;font-size:12px;color:var(--grey);margin-bottom:4px}
.prog-t{height:6px;background:#E8EDF1;border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--orange));width:0%;transition:width .3s}
.sts{padding:14px 32px;background:#fff;border-top:1px solid var(--bdr);display:none;flex-wrap:wrap;gap:10px;align-items:center}.sts.on{display:flex}
.bdg{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
.flt{padding:10px 32px;background:#EEF1F5;display:none;gap:10px;align-items:center;flex-wrap:wrap}.flt.on{display:flex}
.flt label{font-size:12px;font-weight:600}.flt select{padding:5px 10px;border-radius:6px;border:1px solid var(--bdr);font-size:13px}
.fc{font-size:13px;color:var(--grey)}.vt{margin-left:auto;display:flex;gap:4px}
.main{display:flex;min-height:calc(100vh - 380px)}
.mp{flex:2;position:relative;min-height:500px}
#map{width:100%;height:100%;min-height:500px;z-index:1}
.leg{position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.95);border-radius:var(--r);padding:12px 16px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:800;display:none}.leg.on{display:block}
.lt{font-weight:700;margin-bottom:6px;font-size:12px;color:var(--navy)}
.li{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.sp{flex:1;max-width:420px;overflow-y:auto;max-height:calc(100vh - 380px);background:#fff;border-left:1px solid var(--bdr)}
.lp{flex:1;overflow-y:auto;background:#fff;padding:20px 32px;display:none}.lp.on{display:block}
.gp{flex:1;padding:20px;display:none;overflow-y:auto}.gp.on{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;align-content:start}
.ri{padding:10px 12px;border-radius:var(--r);margin-bottom:6px;border:1px solid var(--bdr);cursor:pointer}.ri:hover{border-color:var(--blue);background:#F8FBFF}
.fh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.fh span{font-size:12px;font-weight:600;color:var(--grey);text-transform:uppercase;letter-spacing:1px}
.fh button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--grey)}
.fb{padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff;border-radius:10px 10px 0 0;margin:0 16px}
.ftb{border:1px solid var(--bdr);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin:0 16px}
.fr{display:flex;border-bottom:1px solid var(--bdr);font-size:12px}.fr:last-child{border-bottom:none}
.fl{width:130px;padding:7px 10px;background:#F8F9FA;font-weight:600;flex-shrink:0}
.fv{flex:1;padding:7px 10px;word-break:break-word}
.flk{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.flk a{display:inline-block;padding:7px 14px;border-radius:var(--r);text-decoration:none;font-size:12px;font-weight:600;color:#fff}
.gc{border:2px solid var(--bdr);border-radius:12px;overflow:hidden;cursor:pointer;background:#fff}.gc:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(46,134,193,.15)}
.gc-b{padding:10px 14px;color:#fff;display:flex;align-items:center;gap:8px}
.gc-bd{padding:14px}.gc-bd h4{margin:0 0 4px;color:var(--navy);font-size:14px}.gc-bd p{margin:0 0 4px;font-size:12px;color:var(--grey)}
.gc-tg{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.gc-t{font-size:10px;padding:2px 8px;border-radius:10px}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt thead th{background:var(--navy);color:#fff;padding:10px 8px;text-align:left;font-weight:600;font-size:12px;position:sticky;top:0}
.dt tbody tr{border-bottom:1px solid var(--bdr);cursor:pointer}.dt tbody tr:nth-child(even){background:#FAFBFC}.dt tbody tr:hover{background:#EBF5FB}.dt td{padding:8px}
.ab{display:inline-block;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;white-space:nowrap}
.met{padding:24px 32px;background:#fff;border-top:3px solid var(--navy);display:none}.met.on{display:block}
.met h3{color:var(--navy);font-size:16px;margin-bottom:12px}
.mc{column-count:2;column-gap:32px;font-size:13px;line-height:1.7}.mc p{margin-bottom:8px}
@media(max-width:768px){.mc{column-count:1}}
.ftr{background:linear-gradient(135deg,var(--navy),var(--dark));color:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ftr-l{display:flex;align-items:center;gap:12px}.ftr-l img{height:36px}
.ftr-l .fn{font-size:14px;font-weight:600}.ftr-l .fd{font-size:11px;opacity:.7}
.ftr-r{text-align:right;font-size:11px;opacity:.8}.ftr-r a{color:#fff}.ftr-r .fs{margin-top:4px;font-size:10px;opacity:.6}
.empty{padding:40px 20px;text-align:center;color:var(--grey)}.empty .ei{font-size:48px;margin-bottom:12px}.empty h3{color:var(--navy);margin-bottom:8px}.empty p{font-size:13px;max-width:400px;margin:0 auto}
@media(max-width:900px){.main{flex-direction:column}.sp{max-width:100%;max-height:400px;border-left:none;border-top:1px solid var(--bdr)}.mp{min-height:350px}}
</style>
</head>

// ═══ API ═══
async function apiS(code,naf){
  try{const r=await fetch('https://recherche-entreprises.api.gouv.fr/search?code_commune='+code+'&activite_principale='+naf+'&per_page=25&etat_administratif=A');
    if(!r.ok)return[];const d=await r.json();const ni=NAF.find(n=>n.c.replace('.','')===naf.replace('.',''));
    return(d.results||[]).flatMap(e=>{const ets=(e.matching_etablissements||[]).length?e.matching_etablissements:(e.siege?[e.siege]:[]);
      return ets.map(et=>({siret:et.siret||'',siren:e.siren||'',nom:e.nom_complet||e.nom_raison_sociale||'N/C',act:et.activite_principale||naf,actL:ni?ni.l:naf,adr:et.adresse||'N/C',cp:et.code_postal||'',comm:et.commune||'',lat:et.latitude||null,lon:et.longitude||null,eff:et.tranche_effectif_salarie||e.tranche_effectif_salarie||'',dateCr:et.date_creation||e.date_creation||'',etat:et.etat_administratif||'A',natJur:e.nature_juridique||'',cat:ni?ni.k:'Autre',icon:ni?ni.i:'📍',src:'SIRENE (INSEE)',type:'Établissement actif',surf:'',pollu:'',urba:''}));});
  }catch{return[];}
}
async function apiF(code){
  for(const u of['https://apidf-preprod.cerema.fr/cartofriches/geojson/?code_insee='+code,'https://apidf-preprod.cerema.fr/cartofriches/friches/?code_insee='+code]){
    try{const r=await fetch(u);if(!r.ok)continue;const d=await r.json();
      if(d.features)return d.features.map(f=>{const p=f.properties||{};let la=null,lo=null;const c=f.geometry?.coordinates;
        if(c){if(f.geometry.type==='Point'){lo=c[0];la=c[1];}else{const rg=f.geometry.type==='Polygon'?c[0]:c[0]?.[0]||[];if(rg.length){la=rg.reduce((s,v)=>s+v[1],0)/rg.length;lo=rg.reduce((s,v)=>s+v[0],0)/rg.length;}}}
        return{siret:p.site_id||p.id||'',siren:'',nom:p.site_nom||p.nom||'Friche identifiée',act:'Friche',actL:p.site_type||'Friche industrielle',adr:p.site_adresse||p.adresse||'N/C',cp:p.site_cp||'',comm:p.comm_nom||'',lat:la,lon:lo,eff:'',dateCr:'',etat:p.site_statut||'Friche',natJur:p.proprio_type||'',cat:'Friche',icon:'🏚️',src:'Cartofriches (Cerema)',type:p.site_type||'Friche',surf:p.site_surface||p.surface||'',pollu:p.site_pollution||'',urba:p.urba_zone||''};});
      const ar=d.results||d;if(Array.isArray(ar))return ar.map(f=>({siret:f.site_id||f.id||'',siren:'',nom:f.site_nom||f.nom||'Friche',act:'Friche',actL:f.site_type||'Friche',adr:f.site_adresse||f.adresse||'N/C',cp:f.site_cp||'',comm:f.comm_nom||'',lat:f.site_lat||f.lat||null,lon:f.site_lon||f.lng||f.lon||null,eff:'',dateCr:'',etat:f.site_statut||'Friche',natJur:f.proprio_type||'',cat:'Friche',icon:'🏚️',src:'Cartofriches (Cerema)',type:f.site_type||'Friche',surf:f.site_surface||f.surface||'',pollu:f.site_pollution||'',urba:f.urba_zone||''}));
    }catch{continue;}}return[];
}
async function geo(a,c){if(!a||a==='N/C')return null;try{const r=await fetch('https://api-adresse.data.gouv.fr/search/?q='+encodeURIComponent(a+' '+c)+'&limit=1');if(!r.ok)return null;const d=await r.json();if(d.features?.length){const[lo,la]=d.features[0].geometry.coordinates;return{lat:la,lon:lo};}}catch{}return null;}

// ═══ SEARCH ═══
document.getElementById('bGo').addEventListener('click',launch);
async function launch(){
  if(!sel||role!=='admin')return;all=[];
  const b=document.getElementById('bGo');b.disabled=true;b.textContent='⏳ Recherche...';
  document.getElementById('bCSV').style.display='none';
  ['stB','flB','met','leg'].forEach(x=>document.getElementById(x).classList.remove('on'));
  document.getElementById('prog').classList.add('on');
  const t=NAF.length+1;let s=0;
  for(const n of NAF){s++;prg(s,t,'SIRENE : '+n.l+'...');all.push(...await apiS(sel.code,n.c));await sl(180);}
  s++;prg(s,t,'Cartofriches...');all.push(...await apiF(sel.code));
  const ng=all.filter(r=>!r.lat||!r.lon);
  if(ng.length&&ng.length<=60){prg(s,t,'Géocodage BAN...');for(let i=0;i<ng.length;i++){const g=await geo(ng[i].adr,sel.nom);if(g){ng[i].lat=g.lat;ng[i].lon=g.lon;}if(i%5===0)await sl(80);}}
  const se=new Set();all=all.filter(r=>{const k=r.siret||r.nom+r.adr;if(se.has(k))return false;se.add(k);return true;});
  document.getElementById('prog').classList.remove('on');b.disabled=false;b.textContent='🔍 Lancer le recensement';
  document.getElementById('bCSV').style.display='inline-block';buildUI();
}
function prg(c,t,s){document.getElementById('pS').textContent=s;document.getElementById('pC').textContent=c+'/'+t;document.getElementById('pF').style.width=(c/t*100)+'%';}

// ═══ UI ═══
function buildUI(){bSt();bFl();bMe();render();}
function gF(){const c=document.getElementById('fCa').value,s=document.getElementById('fSr').value;return all.filter(r=>(c==='Tous'||r.cat===c)&&(s==='Tous'||r.src===s));}
function bSt(){const b=document.getElementById('stB');const g=all.filter(r=>r.lat&&r.lon).length;const cs={};all.forEach(r=>{cs[r.cat]=(cs[r.cat]||0)+1;});
  b.innerHTML='<div class="bdg" style="background:#1B3A5C">📊 '+all.length+' établissements</div><div class="bdg" style="background:#2E86C1">📍 '+g+' géolocalisés</div>'+Object.entries(cs).map(([c,n])=>'<div class="bdg" style="background:'+(CC[c]||'#999')+'">'+c+': '+n+'</div>').join('');b.classList.add('on');}
function bFl(){const cs=[...new Set(all.map(r=>r.cat))],ss=[...new Set(all.map(r=>r.src))];
  document.getElementById('fCa').innerHTML='<option value="Tous">Toutes catégories</option>'+cs.map(c=>'<option value="'+c+'">'+c+' ('+all.filter(r=>r.cat===c).length+')</option>').join('');
  document.getElementById('fSr').innerHTML='<option value="Tous">Toutes sources</option>'+ss.map(s=>'<option value="'+s+'">'+s+'</option>').join('');
  document.getElementById('fCa').onchange=document.getElementById('fSr').onchange=render;document.getElementById('flB').classList.add('on');}
function bMe(){if(!sel)return;document.getElementById('metC').innerHTML='<p><strong>Commune :</strong> '+E(sel.nom)+' ('+E(sel.dep)+(sel.pop?', '+parseInt(sel.pop).toLocaleString('fr-FR')+' hab.':'')+')</p><p><strong>SIRENE (INSEE)</strong> — '+NAF.length+' codes NAF : entreposage, transport, distribution, services logistiques, immobilier, commerce de gros.</p><p><strong>Cartofriches (Cerema)</strong> — Friches industrielles (14 300+ sites), avec surfaces et données de pollution.</p><p><strong>BAN</strong> — Géocodage Base Adresse Nationale.</p><p><strong>Limites :</strong> Codes NAF parfois imprécis. Surfaces non disponibles dans SIRENE. SITADEL, DVF+, BASIAS/BASOL, PLU non interrogés.</p>';document.getElementById('met').classList.add('on');}

function render(){const f=gF();document.getElementById('fCn').textContent='→ '+f.length+' résultat'+(f.length>1?'s':'');uMap(f);uSide(f);uList(f);uGrid(f);
  const lg=document.getElementById('leg');lg.innerHTML='<div class="lt">Légende</div>'+[...new Set(all.map(r=>r.cat))].map(c=>'<div class="li"><div class="ld" style="background:'+(CC[c]||'#999')+'"></div><span>'+c+'</span></div>').join('');lg.classList.add('on');}

function uMap(f){mG.clearLayers();const ps=f.filter(r=>r.lat&&r.lon);if(!ps.length&&sel){lM.setView([sel.lat,sel.lon],13);return;}const bs=[];
  ps.forEach(r=>{const c=CC[r.cat]||'#666';const ic=L.divIcon({className:'',html:'<div style="background:'+c+';width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer">'+r.icon+'</div>',iconSize:[30,30],iconAnchor:[15,15]});
    const pp='<div style="min-width:220px"><strong style="color:#1B3A5C">'+E(r.nom)+'</strong><br><span style="color:'+c+';font-weight:600">'+r.icon+' '+E(r.actL)+'</span><br><small>'+E(r.adr)+'</small>'+(r.surf?'<br><small>📐 <b>'+r.surf+' m²</b></small>':'')+'</div>';
    L.marker([r.lat,r.lon],{icon:ic}).addTo(mG).bindPopup(pp).on('click',()=>showF(r));bs.push([r.lat,r.lon]);});
  if(bs.length)lM.fitBounds(bs,{padding:[30,30],maxZoom:15});}

function uSide(f){const el=document.getElementById('sC');if(!f.length){el.innerHTML='<div class="empty"><div class="ei">📭</div><h3>Aucun résultat</h3></div>';return;}
  let h='<div style="padding:12px 16px;font-size:14px;font-weight:600;color:#1B3A5C;border-bottom:1px solid #DEE2E6">'+f.length+' résultat'+(f.length>1?'s':'')+'</div>';
  f.slice(0,80).forEach(r=>{const c=CC[r.cat]||'#999';h+='<div class="ri" onclick="clk('+all.indexOf(r)+')"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+r.icon+'</span><div style="flex:1"><div style="font-weight:600;font-size:13px">'+E(r.nom)+'</div><div style="font-size:11px;color:'+c+'">'+E(r.actL)+'</div>'+(r.surf?'<div style="font-size:11px;color:#8E44AD">📐 '+r.surf+' m²</div>':'')+'</div>'+(r.lat?'<span style="color:#27AE60;font-size:11px">📍</span>':'')+'</div></div>';});el.innerHTML=h;}

function uList(f){let h='<table class="dt"><thead><tr><th></th><th>Nom</th><th>Activité</th><th>Adresse</th><th>Surface</th><th>Effectif</th><th>Source</th></tr></thead><tbody>';
  f.forEach(r=>{h+='<tr onclick="clk('+all.indexOf(r)+')"><td>'+r.icon+'</td><td style="font-weight:600;color:#1B3A5C">'+E(r.nom)+'</td><td><span class="ab" style="background:'+(CC[r.cat]||'#999')+'">'+E(r.actL)+'</span></td><td style="font-size:12px;color:#7F8C8D">'+E(r.adr)+'</td><td style="font-size:12px;font-weight:600;color:#8E44AD">'+(r.surf?r.surf+' m²':'—')+'</td><td style="font-size:12px">'+(EF[r.eff]||'')+'</td><td style="font-size:11px">'+E(r.src)+'</td></tr>';});
  document.getElementById('lP').innerHTML=h+'</tbody></table>';}

function uGrid(f){document.getElementById('gP').innerHTML=f.map(r=>{const c=CC[r.cat]||'#999';
  return '<div class="gc" onclick="clk('+all.indexOf(r)+')"><div class="gc-b" style="background:'+c+'"><span style="font-size:22px">'+r.icon+'</span><span style="font-size:11px;font-weight:600;text-transform:uppercase">'+E(r.cat)+'</span></div><div class="gc-bd"><h4>'+E(r.nom)+'</h4><p>'+E(r.actL)+'</p><p>📍 '+E(r.adr)+'</p>'+(r.surf?'<p style="color:#8E44AD;font-weight:600">📐 '+r.surf+' m²</p>':'')+'<div class="gc-tg"><span class="gc-t" style="background:#EEF1F5;color:#2C3E50">'+E(r.src)+'</span>'+(r.eff&&EF[r.eff]?'<span class="gc-t" style="background:#EBF5FB;color:#2E86C1">👥 '+EF[r.eff]+'</span>':'')+'</div></div></div>';}).join('');}

function clk(i){const r=all[i];if(!r)return;showF(r);if(r.lat&&r.lon)lM.setView([r.lat,r.lon],16);if(cv!=='map')setV('map');}
function showF(r){if(!r)return;const el=document.getElementById('sC');const c=CC[r.cat]||'#999';
  const fs=[];if(r.siret)fs.push(['SIRET',r.siret]);if(r.siren)fs.push(['SIREN',r.siren]);
  fs.push(['Code NAF',r.act],['Activité',r.actL],['Adresse',r.adr]);
  if(r.cp)fs.push(['Code postal',r.cp]);fs.push(['Commune',r.comm||sel?.nom||'']);
  if(r.surf)fs.push(['📐 Surface',r.surf+' m²']);if(EF[r.eff])fs.push(['Effectif',EF[r.eff]]);
  if(r.dateCr)fs.push(['Date création',r.dateCr]);fs.push(['État',r.etat]);
  if(r.natJur)fs.push(['Nature juridique',r.natJur]);fs.push(['Source',r.src],['Type',r.type]);
  if(r.pollu)fs.push(['Pollution',r.pollu]);if(r.urba)fs.push(['Urbanisme',r.urba]);
  if(r.lat&&r.lon)fs.push(['GPS',Number(r.lat).toFixed(6)+', '+Number(r.lon).toFixed(6)]);
  let h='<div class="fh"><span>Fiche de synthèse</span><button onclick="render()">✕</button></div><div class="fb" style="background:'+c+'"><span style="font-size:28px">'+(r.icon||'📍')+'</span><div><div style="font-size:11px;opacity:.9">'+(r.cat||'')+'</div><div style="font-size:15px;font-weight:700">'+E(r.nom)+'</div></div></div><div class="ftb">'+fs.map(([l,v])=>'<div class="fr"><div class="fl">'+l+'</div><div class="fv">'+E(v)+'</div></div>').join('')+'</div><div class="flk">';
  if(r.lat&&r.lon)h+='<a style="background:#2E86C1" href="https://www.google.com/maps?q='+r.lat+','+r.lon+'" target="_blank">🗺️ Google Maps</a><a style="background:#27AE60" href="https://www.openstreetmap.org/?mlat='+r.lat+'&mlon='+r.lon+'#map=18/'+r.lat+'/'+r.lon+'" target="_blank">🌍 OSM</a>';
  if(r.siret&&r.siret.length>=14)h+='<a style="background:#1B3A5C" href="https://annuaire-entreprises.data.gouv.fr/etablissement/'+r.siret+'" target="_blank">🏛️ Fiche entreprise</a>';
  el.innerHTML=h+'</div>';if(cv!=='map')setV('map');}

function setV(v){cv=v;document.querySelectorAll('.vt .btn-o').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  document.getElementById('mP').style.display=v==='map'?'':'none';document.getElementById('side').style.display=v==='map'?'':'none';
  document.getElementById('lP').classList.toggle('on',v==='list');document.getElementById('gP').classList.toggle('on',v==='grid');
  if(v==='map')setTimeout(()=>lM.invalidateSize(),100);}

document.getElementById('bCSV').addEventListener('click',()=>{
  if(role!=='admin')return;const f=gF();if(!f.length)return;
  const rs=f.map(r=>({SIRET:r.siret,SIREN:r.siren,Nom:r.nom,Code_NAF:r.act,Activite:r.actL,Categorie:r.cat,Adresse:r.adr,Code_Postal:r.cp,Commune:r.comm||sel?.nom||'',Latitude:r.lat||'',Longitude:r.lon||'',Surface_m2:r.surf||'',Effectif:EF[r.eff]||'',Date_Creation:r.dateCr,Etat:r.etat,Source:r.src,Type:r.type,Pollution:r.pollu||'',Urbanisme:r.urba||'',Date_Collecte:new Date().toISOString().split('T')[0]}));
  const hd=Object.keys(rs[0]);const csv='\uFEFF'+hd.join(';')+'\n'+rs.map(r=>hd.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='ELV-'+(sel?.nom||'')+'-'+new Date().toISOString().split('T')[0]+'.csv';a.click();});
</script>
</body></html>
